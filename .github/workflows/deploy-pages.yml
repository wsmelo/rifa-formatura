name: Publicar site da rifa

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4
      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Gerar o site
        run: npm run build
        env:
          VITE_RIFA_SUPABASE_URL: ${{ secrets.VITE_RIFA_SUPABASE_URL }}
          VITE_RIFA_SUPABASE_ANON_KEY: ${{ secrets.VITE_RIFA_SUPABASE_ANON_KEY }}
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Enviar arquivos do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
